<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIAP - Reportes</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="bg-gray-900 text-white">

<!-- LOGIN -->
<div id="login" class="flex items-center justify-center h-screen">
  <div class="bg-gray-800 p-6 rounded-xl w-80">
    <h2 class="text-lg mb-4">Ingreso</h2>
    <input id="nombre" placeholder="Nombre" class="w-full p-2 mb-3 text-black">
    <button onclick="login()" class="w-full bg-blue-600 p-2 rounded">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden p-4">

<h1 class="text-xl mb-4">Sistema de Reportes</h1>

<input id="direccion" placeholder="Dirección" class="w-full p-2 mb-2 text-black">
<textarea id="narracion" placeholder="Narración" class="w-full p-2 mb-2 text-black"></textarea>

<div class="flex gap-2">
  <button onclick="guardar()" class="bg-blue-600 px-4 py-2 rounded">Guardar</button>
  <button onclick="pdf()" class="bg-red-600 px-4 py-2 rounded">PDF</button>
</div>

</div>

<script>
let usuario = null;

function login() {
  const nombre = document.getElementById("nombre").value.trim();
  if (!nombre) return alert("Ingrese nombre");

  usuario = nombre;
  localStorage.setItem("usuario", nombre);

  document.getElementById("login").style.display = "none";
  document.getElementById("app").classList.remove("hidden");
}

window.onload = () => {
  const u = localStorage.getItem("usuario");
  if (u) {
    usuario = u;
    document.getElementById("login").style.display = "none";
    document.getElementById("app").classList.remove("hidden");
  }
};

function guardar() {
  const data = {
    usuario,
    direccion: document.getElementById("direccion").value,
    narracion: document.getElementById("narracion").value,
    fecha: new Date().toLocaleString()
  };

  let arr = JSON.parse(localStorage.getItem("reportes")) || [];
  arr.push(data);
  localStorage.setItem("reportes", JSON.stringify(arr));

  alert("Guardado");
}

function pdf() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const direccion = document.getElementById("direccion").value;
  const narracion = document.getElementById("narracion").value;

  doc.text("REPORTE SIAP", 10, 10);
  doc.text("Usuario: " + usuario, 10, 20);
  doc.text("Dirección: " + direccion, 10, 30);
  doc.text("Narración:", 10, 40);
  doc.text(narracion, 10, 50);

  doc.save("reporte.pdf");
}
</script>

</body>
</html>
